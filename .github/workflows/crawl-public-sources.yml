name: Crawl public sources

on:
  schedule:
    - cron: "30 1 * * 1"
  workflow_dispatch:

jobs:
  crawl:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run crawl
      - uses: peter-evans/create-pull-request@v6
        with:
          branch: automated/public-source-crawl
          title: "Update public posting timeline"
          commit-message: "Update public posting timeline"
          body: "Scheduled public-source crawl generated reviewable timeline drafts or stubs."
